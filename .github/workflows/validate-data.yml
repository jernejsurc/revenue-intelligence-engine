name: data validation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: neondb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Hermetic CI database; sslmode=disable so the seed script
      # doesn't force SSL (Neon requires it, the CI container has none).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neondb?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply schema, seed, and assert fingerprints
        run: python scripts/validate_pipeline.py
